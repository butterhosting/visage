services:
  maxmindmock:
    build:
      context: ./maxmindmock
      dockerfile: Dockerfile
    networks:
      - app-network
    stop_grace_period: 100ms
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3030/ || exit 1"]
      interval: 1s
      timeout: 10s
      retries: 10

networks:
  app-network:
    driver: bridge
